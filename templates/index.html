<!doctype html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<title>Grocery App</title>
</head>

<body>

<div class="container">
    <h1>Grocery List</h1>

    <form method="POST" action="/add">
        <input name="item" placeholder="Add item" required> 
        <button type="submit">Add</button>
    </form>

    <ul>
    {% for i in items %}
        <li>
            {{ i }}
            <a href="/delete/{{ loop.index0 }}">Remove</a>
        </li>
    {% endfor %}
    </ul>
</div>

</body>
</html>
